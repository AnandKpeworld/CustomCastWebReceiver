<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>CastConnect Receiver</title>

  <!-- Google Cast Application Framework (CAF) receiver -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <!-- YouTube IFrame Player API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    html, body {
      width: 100%; height: 100%; margin: 0; padding: 0;
      background: #000; overflow: hidden;
    }
    /* CAF's media player: gallery video, IPTV, photos, app logo. */
    cast-media-player {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }
    /* YouTube IFrame overlay — shown only while a YouTube video is playing. */
    #yt-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: none; z-index: 10;
    }
    #yt-player { width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <!-- Plays everything that arrives via loadMedia(): gallery videos, IPTV, photos -->
  <cast-media-player></cast-media-player>

  <!-- Plays YouTube via the real IFrame player (driven by the app's custom channel) -->
  <div id="yt-layer"><div id="yt-player"></div></div>

  <script>
    /* =====================================================================
       CastConnect — Custom Web Receiver

       Plays local video / IPTV / photos through the standard CAF media player,
       and YouTube through the real YouTube IFrame Player API.

       The iOS app (CastManager.swift) talks to this receiver over a custom
       namespace. Messages are JSON:

         App  -> receiver:
           { "action":"play",   "videoId":"<id>" }   load + play a YouTube video
           { "action":"pause" }                       pause
           { "action":"resume" }                      resume
           { "action":"seek",   "seconds": 10 }       skip ±10s (relative)
           { "action":"seekTo", "seconds": 90 }       jump to absolute position
           { "action":"stop" }                        stop, hide YouTube overlay

         Receiver -> app (reported on the same namespace, keyed by "type" so it
         never collides with the app's "action" messages):
           { "type":"status", "time":12.3, "duration":210, "state":1 }  ~1/sec
           { "type":"ended" }                                           video finished

       NOTE: addCustomMessageListener is the correct CAF v3 API. The older
       getCustomMessageBus() does NOT exist in CAF v3 — calling it throws and the
       receiver disconnects ("Disconnected from receiver"). Do not use it.
       ===================================================================== */

    // MUST match CastReceiverConfig.namespace in the iOS app exactly.
    const YT_NAMESPACE = 'urn:x-cast:zb.ScreenMirroring.CastifyTV.youtube';

    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    const ytLayer = document.getElementById('yt-layer');
    let ytPlayer = null;        // the YouTube IFrame player instance
    let ytReady = false;        // YouTube IFrame API finished loading
    let pendingVideoId = null;  // a play() that arrived before the API was ready
    let statusTimer = null;     // periodic position reporter

    // ---- YouTube layer helpers ------------------------------------------------
    function showYouTube() { ytLayer.style.display = 'block'; }
    function hideYouTube() {
      ytLayer.style.display = 'none';
      stopStatusReports();
      if (ytPlayer && ytPlayer.stopVideo) {
        try { ytPlayer.stopVideo(); } catch (e) {}
      }
    }

    // Broadcast a JSON message back to the app on our namespace.
    function notifyApp(message) {
      try { context.sendCustomMessage(YT_NAMESPACE, undefined, message); } catch (e) {}
    }

    function startStatusReports() {
      stopStatusReports();
      statusTimer = setInterval(function () {
        if (!ytPlayer || !ytReady || ytLayer.style.display !== 'block') return;
        try {
          notifyApp({
            type: 'status',
            time: ytPlayer.getCurrentTime() || 0,
            duration: ytPlayer.getDuration() || 0,
            state: ytPlayer.getPlayerState()   // 1=playing 2=paused 3=buffering 0=ended
          });
        } catch (e) {}
      }, 1000);
    }
    function stopStatusReports() {
      if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
    }

    // Called automatically by the IFrame API once it has loaded.
    window.onYouTubeIframeAPIReady = function () {
      ytPlayer = new YT.Player('yt-player', {
        width: '100%', height: '100%',
        playerVars: {
          autoplay: 1, controls: 1, rel: 0, fs: 1,
          playsinline: 1, modestbranding: 1, iv_load_policy: 3
        },
        events: {
          onReady: function () {
            ytReady = true;
            if (pendingVideoId) { playYouTube(pendingVideoId); pendingVideoId = null; }
          },
          onStateChange: function (e) {
            if (e.data === YT.PlayerState.ENDED) {
              notifyApp({ type: 'ended' });   // app auto-advances to next video
            }
          }
        }
      });
    };

    function playYouTube(videoId) {
      if (!videoId) return;
      // A YouTube request takes over the screen: stop any CAF media first.
      try { playerManager.stop(); } catch (e) {}
      showYouTube();
      if (!ytReady || !ytPlayer) { pendingVideoId = videoId; return; }
      ytPlayer.loadVideoById(videoId);
      ytPlayer.playVideo();
      startStatusReports();
    }

    // ---- Custom channel: messages from the iOS app ----------------------------
    context.addCustomMessageListener(YT_NAMESPACE, function (event) {
      // event.data may be an object (JSON namespace) or a JSON string — handle both.
      let data = event.data || {};
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch (e) { data = {}; }
      }
      switch (data.action) {
        case 'play':
          playYouTube(data.videoId);
          break;
        case 'pause':
          if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
          break;
        case 'resume':
          if (ytPlayer && ytPlayer.playVideo) ytPlayer.playVideo();
          break;
        case 'seek':
          if (ytPlayer && ytPlayer.seekTo && ytPlayer.getCurrentTime) {
            let target = ytPlayer.getCurrentTime() + (Number(data.seconds) || 0);
            if (target < 0) target = 0;
            ytPlayer.seekTo(target, true);
          }
          break;
        case 'seekTo':
          if (ytPlayer && ytPlayer.seekTo) {
            ytPlayer.seekTo(Math.max(0, Number(data.seconds) || 0), true);
          }
          break;
        case 'stop':
          hideYouTube();
          break;
        default:
          // Tolerate a bare { videoId } too.
          if (data.videoId) playYouTube(data.videoId);
          break;
      }
    });

    // ---- CAF media: hide the YouTube layer whenever real media loads ----------
    // Any loadMedia() from the app (gallery video, IPTV, photo, logo) reclaims
    // the screen.
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      function (loadRequest) {
        hideYouTube();
        return loadRequest;
      }
    );

    // ---- Start the receiver ---------------------------------------------------
    const options = new cast.framework.CastReceiverOptions();
    // Keep the receiver alive when idle so the app can switch between YouTube and
    // local media without the session dropping.
    options.disableIdleTimeout = true;
    // Advertise our custom namespace so the SDK routes the app's messages here.
    options.customNamespaces = {};
    options.customNamespaces[YT_NAMESPACE] = cast.framework.system.MessageType.JSON;

    context.start(options);
    console.log('CastConnect receiver started (media + YouTube IFrame)');
  </script>
</body>
</html>
